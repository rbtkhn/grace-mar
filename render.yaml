# Render Blueprint: Grace-Mar Mini App + Telegram Webhook
# See docs/miniapp-setup.md and docs/telegram-webhook-setup.md.
#
# Telegram bot runs via webhook on the miniapp service (no separate worker).
# RENDER_EXTERNAL_URL is set automatically; webhook URL = RENDER_EXTERNAL_URL/telegram/webhook
#
# Optional: Use Docker by setting runtime: docker and dockerfilePath: Dockerfile in this service.
# For local dev: docker compose up --build (miniapp on 5000, gate-review on 5001).

services:
  - type: web
    name: grace-mar-miniapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python apps/miniapp_server.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GRACE_MAR_REPO
        value: rbtkhn/grace-mar
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # When set, Telegram webhook is enabled (RENDER_EXTERNAL_URL used)
      - key: PROFILE_MINIAPP_URL
        sync: false  # URL for bot menu button (e.g. https://grace-mar.com for profile); DASHBOARD_MINIAPP_URL still supported
      - key: OPERATOR_FETCH_SECRET
        sync: false  # Optional: when set, GET /operator/session-transcript and /operator/recursion-gate return live files (Bearer token). Use scripts/fetch_operator_files.py from Cursor to pull chat into local repo.
      - key: FAMILY_APP_TOKEN
        sync: false  # Optional: enables /app family hub (chat + log + parent-gated review). Bookmark https://<host>/app?t=<token>
      - key: POL_DASHBOARD_TOKEN
        sync: false  # Optional: internal work-politics job dashboard at /pol (SMM + operator). API: X-Pol-Token, X-Wap-Token, or Bearer
      - key: POL_JOBS_PATH
        sync: false  # Optional: path to jobs JSON; default data/wap_jobs.json (ephemeral on Render unless on persistent disk)
      - key: WAP_DASHBOARD_TOKEN
        sync: false  # Legacy alias if POL_DASHBOARD_TOKEN unset
      - key: WAP_JOBS_PATH
        sync: false  # Legacy alias if POL_JOBS_PATH unset
