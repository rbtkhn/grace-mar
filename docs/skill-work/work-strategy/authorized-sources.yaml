review_rules:
  - rule: "If artifact_type == neutral_fact_summary, do not rely solely on analyst, transcript, or operator_note."
  - rule: "If historical framing is used, require mechanism, fit, mismatch, and falsifier."
  - rule: "If artifact_type == decision_point_support, prefer at least one primary or data anchor."
  - rule: "If source_class == transcript, label interpretation explicitly unless independently verified."
  - rule: "If doctrine_candidate is proposed, require more than one source cluster or repeated local use."
  - rule: "If a source repeatedly contributes only rhetoric and not judgment, downgrade or prune it."

maintenance:
  review_cadence: monthly
  prune_when:
    - "source is no longer used in real work-strategy artifacts"
    - "source repeatedly adds rhetoric without decision value"
    - "source registry becomes bloated or duplicative"
  healthy_when:
    - "human policy and yaml shape agree"
    - "source classes map clearly to artifact types"
    - "historical framing is disciplined rather than ornamental"
    - "promotion eligibility remains selective"
