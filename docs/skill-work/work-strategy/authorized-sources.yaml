id: "p14r8x"
version: 1
status: active
scope: work_only
lane: work-strategy
purpose: >
  Machine-readable source registry for work-strategy. Tracks source class,
  trust posture, artifact eligibility, review cadence, and special handling
  for historical/civilizational use.

defaults:
  promotion_eligible: false
  transcript_rule: >
    Treat transcript-derived material as interpretation unless independently verified.
  historical_use_rule: >
    Historical or civilizational framing requires explicit fit, mismatch, and falsifier logic.
  neutral_summary_rule: >
    Do not present commentary or transcript rhetoric as neutral fact without corroboration.

source_classes:
  primary:
    description: "Official or direct-source material."
    typical_uses:
      - neutral_fact_summary
      - current_events_analysis
      - watch_support
      - decision_point_support
    promotion_default: true

  data:
    description: "Structured datasets, market feeds, polling with methodology, shipping/trade/energy data."
    typical_uses:
      - neutral_fact_summary
      - current_events_analysis
      - watch_support
      - decision_point_support
      - doctrine_candidate
    promotion_default: true

  reporting:
    description: "Reputable reporting and event chronology."
    typical_uses:
      - neutral_fact_summary
      - current_events_analysis
      - watch_support
      - decision_point_support
    promotion_default: true

  analyst:
    description: "Interpretive analysis, essays, newsletters, interviews."
    typical_uses:
      - current_events_analysis
      - resonance_note
      - analogy_audit
      - strategy_notebook
    promotion_default: conditional

  transcript:
    description: "Podcasts, video transcripts, long-form discussions, lectures."
    typical_uses:
      - resonance_note
      - analogy_audit
      - strategy_notebook
      - watch_support
    promotion_default: conditional

  operator_note:
    description: "Local work artifacts such as notebook entries, audits, and receipts."
    typical_uses:
      - resonance_note
      - analogy_audit
      - strategy_notebook
      - doctrine_candidate
    promotion_default: conditional

artifact_types:
  neutral_fact_summary:
    preferred_classes: [primary, data, reporting]
    caution_classes: [analyst, transcript]
    disallow_as_sole_basis: [analyst, transcript, operator_note]

  current_events_analysis:
    preferred_classes: [primary, data, reporting]
    allowed_classes: [analyst, transcript, operator_note]

  resonance_note:
    allowed_classes: [primary, data, reporting, analyst, transcript, operator_note]

  analogy_audit:
    allowed_classes: [primary, data, reporting, analyst, transcript, operator_note]

  watch_support:
    preferred_classes: [primary, data, reporting]
    allowed_classes: [analyst, transcript]
    caution_note: >
      Commentary may initiate a watch, but meaningful watch support should ideally
      rest on corroborated signal.

  decision_point_support:
    preferred_classes: [primary, data, reporting]
    allowed_classes: [analyst, transcript]
    caution_note: >
      Analyst or transcript material may frame options but should not usually be
      the sole basis for a material recommendation.

  strategy_notebook:
    allowed_classes: [primary, data, reporting, analyst, transcript, operator_note]

  doctrine_candidate:
    preferred_classes: [primary, data, reporting]
    allowed_classes: [analyst, transcript, operator_note]
    caution_note: >
      No doctrine candidate should rest primarily on a single commentator,
      transcript, or hot-cycle cluster.

