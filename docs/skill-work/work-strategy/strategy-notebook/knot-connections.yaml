    to: docs/skill-work/work-strategy/strategy-notebook/chapters/2026-04/knots/strategy-notebook-knot-2026-04-14-scott-ritter-blockade-hormuz-weave.md
    relation: extends
    reason: "Ritter blockade mechanics extends the Islamabad-Hormuz thesis with operational detail."
    warrant:
