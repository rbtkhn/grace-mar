<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Strategy Notebook</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-2: #eef3f1;
      --ink: #17202a;
      --muted: #64707d;
      --line: #d7dde3;
      --line-strong: #aeb8c2;
      --accent: #176f66;
      --accent-2: #9a4f18;
      --danger: #9f2f2f;
      --mark: #fff3c4;
      --code: #20262d;
      --shadow: 0 10px 30px rgba(22, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      min-height: 2.25rem;
      border-radius: 6px;
      padding: 0.42rem 0.7rem;
      cursor: pointer;
    }

    button:hover, button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #f1faf8;
    }

    input[type="search"] {
      width: 100%;
      min-height: 2.45rem;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      padding: 0.45rem 0.65rem;
    }

    .date-scroll {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      height: 22rem;
      max-height: calc(100vh - 20rem);
      min-height: 19rem;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .selector-scroll {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      height: 22rem;
      max-height: calc(100vh - 20rem);
      min-height: 19rem;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .date-button, .expert-button {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.55rem;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      min-height: 2.05rem;
      padding: 0.28rem 0.55rem;
      text-align: left;
    }

    .expert-button {
      min-height: 2.6rem;
    }

    .date-button:hover, .date-button.active,
    .expert-button:hover, .expert-button.active {
      background: #f1faf8;
      color: var(--accent);
    }

    .date-button .date, .expert-button .expert-id {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.82rem;
    }

    .date-button .count, .expert-button .count {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .expert-button .expert-name {
      display: block;
      font-weight: 680;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expert-button .expert-id {
      display: block;
      color: var(--muted);
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 248, 250, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .topbar {
      max-width: 1500px;
      margin: 0 auto;
      padding: 1rem 1.25rem 0.85rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 2vw, 2.2rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 0.35rem;
    }

    .mode-tabs {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
      padding: 0.25rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mode-tabs button {
      border-color: transparent;
      min-width: 7.5rem;
    }

    main {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem 1.25rem 2rem;
      display: grid;
      grid-template-columns: minmax(18rem, 23rem) minmax(0, 1fr);
      gap: 1rem;
    }

    aside, .reader {
      min-width: 0;
    }

    aside {
      display: grid;
      align-content: start;
      gap: 0.75rem;
    }

    .control-panel, .list-panel, .reader-panel, .meta-strip {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .control-panel {
      padding: 0.85rem;
      display: grid;
      gap: 0.8rem;
    }

    .field label {
      display: block;
      margin: 0 0 0.25rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    .counts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 1.6rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      color: var(--muted);
      background: var(--surface-2);
      font-size: 0.78rem;
    }

    .list-panel {
      overflow: hidden;
    }

    .list-head {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .list-head h2 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0;
    }

    .file-list {
      max-height: calc(100vh - 23rem);
      min-height: 14rem;
      overflow: auto;
    }

    .file-button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      gap: 0.2rem;
      padding: 0.7rem 0.8rem;
      text-align: left;
      min-height: 4.35rem;
    }

    .file-button:hover, .file-button.active {
      background: #f2f7f6;
      color: var(--ink);
    }

    .file-title {
      font-weight: 680;
      overflow-wrap: anywhere;
    }

    .file-path {
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.74rem;
      overflow-wrap: anywhere;
    }

    .file-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .binding-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      padding: 0.7rem 0.8rem;
      margin: 0 0 0.9rem;
      display: grid;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .binding-box strong {
      color: var(--ink);
    }

    .reader {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.75rem;
      min-height: calc(100vh - 7rem);
    }

    .meta-strip {
      padding: 0.8rem 0.95rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
    }

    .selected-title {
      font-weight: 760;
      font-size: 1.05rem;
      overflow-wrap: anywhere;
    }

    .selected-path {
      margin-top: 0.2rem;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      color: var(--muted);
      font-size: 0.78rem;
      overflow-wrap: anywhere;
    }

    .reader-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: end;
    }

    .reader-panel {
      overflow: auto;
      min-height: 24rem;
      max-height: calc(100vh - 13rem);
      padding: 1.1rem;
    }

    .empty {
      color: var(--muted);
      padding: 1rem;
    }

    .markdown {
      max-width: 72rem;
    }

    .markdown h1, .markdown h2, .markdown h3 {
      letter-spacing: 0;
      line-height: 1.15;
    }

    .markdown h1 {
      font-size: 1.55rem;
      margin: 0 0 0.9rem;
    }

    .markdown h2 {
      font-size: 1.22rem;
      margin: 1.5rem 0 0.5rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--line);
    }

    .markdown h3 {
      font-size: 1.02rem;
      margin: 1.1rem 0 0.35rem;
    }

    .markdown p {
      margin: 0.55rem 0;
    }

    .markdown pre {
      overflow: auto;
      background: var(--code);
      color: #f4f7fb;
      border-radius: 8px;
      padding: 0.85rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .markdown code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.88em;
      background: #eef0f4;
      padding: 0.08rem 0.25rem;
      border-radius: 4px;
    }

    .markdown pre code {
      background: transparent;
      padding: 0;
    }

    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.8rem 0;
      font-size: 0.92rem;
    }

    .markdown th, .markdown td {
      border: 1px solid var(--line);
      padding: 0.42rem 0.5rem;
      vertical-align: top;
    }

    .markdown th {
      background: var(--surface-2);
      text-align: left;
    }

    .markdown blockquote {
      margin: 0.8rem 0;
      border-left: 3px solid var(--accent-2);
      padding: 0.25rem 0 0.25rem 0.8rem;
      color: #39424e;
      background: #fffaf0;
    }

    .hidden { display: none !important; }

    .expert-groups {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.65rem 0.8rem;
      border-bottom: 1px solid var(--line);
    }

    .thread-note {
      display: grid;
      gap: 0.25rem;
      padding: 0.65rem 0.8rem;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .thread-note strong {
      color: var(--ink);
    }

    .group-button {
      min-height: 2rem;
      font-size: 0.82rem;
    }

    .source-link {
      color: var(--accent);
      text-decoration: none;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 980px) {
      .topbar, main {
        grid-template-columns: 1fr;
      }

      .mode-tabs {
        width: 100%;
      }

      .mode-tabs button {
        flex: 1;
        min-width: 0;
      }

      .meta-strip {
        grid-template-columns: 1fr;
      }

      .reader-actions {
        justify-content: start;
      }

      .file-list, .reader-panel {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="topbar">
        <div>
          <h1>Strategy Notebook</h1>
          <div class="status" id="statusLine">Loading local notebook index...</div>
        </div>
        <nav class="mode-tabs" aria-label="View mode">
          <button id="rawMode" class="active" type="button">Raw Inputs</button>
          <button id="expertMode" type="button">Experts</button>
        </nav>
      </div>
    </header>

    <main>
      <aside>
        <section id="rawControls" class="control-panel">
          <div class="field">
            <label for="rawSearch">Filter raw inputs</label>
            <input id="rawSearch" type="search" placeholder="title, path, thread, kind" />
          </div>
          <div class="field">
            <label for="dateList">Date</label>
            <div id="dateList" class="date-scroll" role="listbox" aria-label="Raw input dates"></div>
          </div>
          <div id="rawCounts" class="counts"></div>
        </section>

      <section id="expertControls" class="control-panel hidden">
          <div class="field">
            <label for="expertSearch">Filter expert files</label>
            <input id="expertSearch" type="search" placeholder="page, thread, bio, date" />
          </div>
          <div class="field">
            <label for="expertList">Strategy expert</label>
            <div id="expertList" class="selector-scroll" role="listbox" aria-label="Strategy experts"></div>
          </div>
          <div id="expertCounts" class="counts"></div>
        </section>

        <section class="list-panel">
          <div class="list-head">
            <h2 id="listTitle">Raw inputs</h2>
            <span id="listCount" class="pill">0 files</span>
          </div>
          <div id="threadNote" class="thread-note hidden"></div>
          <div id="expertGroups" class="expert-groups hidden"></div>
          <div id="fileList" class="file-list"></div>
        </section>
      </aside>

      <section class="reader">
        <div class="meta-strip">
          <div>
            <div id="selectedTitle" class="selected-title">Select a file</div>
            <div id="selectedPath" class="selected-path">No file loaded</div>
          </div>
          <div class="reader-actions">
            <button id="openRaw" type="button">Open Markdown</button>
            <button id="copyPath" type="button">Copy path</button>
          </div>
        </div>

        <article id="readerPanel" class="reader-panel">
          <div class="empty">Choose a date or expert from the left.</div>
        </article>
      </section>
    </main>
  </div>

  <script>
    const state = {
      fixture: null,
      mode: "raw",
      selectedDate: "",
      selectedExpert: "",
    selectedGroup: "threads",
      selectedFile: null,
      visibleFiles: []
    };

    const els = {
      statusLine: document.getElementById("statusLine"),
      rawMode: document.getElementById("rawMode"),
      expertMode: document.getElementById("expertMode"),
      rawControls: document.getElementById("rawControls"),
      expertControls: document.getElementById("expertControls"),
      dateList: document.getElementById("dateList"),
    expertList: document.getElementById("expertList"),
      rawSearch: document.getElementById("rawSearch"),
      expertSearch: document.getElementById("expertSearch"),
      rawCounts: document.getElementById("rawCounts"),
    expertCounts: document.getElementById("expertCounts"),
    listTitle: document.getElementById("listTitle"),
    listCount: document.getElementById("listCount"),
    threadNote: document.getElementById("threadNote"),
    expertGroups: document.getElementById("expertGroups"),
      fileList: document.getElementById("fileList"),
      selectedTitle: document.getElementById("selectedTitle"),
      selectedPath: document.getElementById("selectedPath"),
      readerPanel: document.getElementById("readerPanel"),
      openRaw: document.getElementById("openRaw"),
      copyPath: document.getElementById("copyPath")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fileUrl(path) {
      return "../../" + String(path).split("/").map(encodeURIComponent).join("/");
    }

    function fmtBytes(bytes) {
      if (!bytes && bytes !== 0) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function compactTitle(file) {
      return file.title && file.title !== file.name ? file.title : file.name;
    }

    function searchable(file) {
      return [
        file.name,
        file.title,
        file.path,
        file.kind,
        file.thread,
        file.pubDate,
        file.ingestDate,
        file.sourceUrl
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function setMode(mode) {
      state.mode = mode;
      els.rawMode.classList.toggle("active", mode === "raw");
      els.expertMode.classList.toggle("active", mode === "expert");
    els.rawControls.classList.toggle("hidden", mode !== "raw");
    els.expertControls.classList.toggle("hidden", mode !== "expert");
    els.expertGroups.classList.toggle("hidden", mode !== "expert");
    els.threadNote.classList.toggle("hidden", mode !== "expert");
    renderList();
    }

    function selectedDate() {
      return state.fixture.dates.find((d) => d.date === state.selectedDate) || state.fixture.dates[0];
    }

    function selectedExpert() {
      return state.fixture.experts.find((e) => e.id === state.selectedExpert) || state.fixture.experts[0];
    }

    function groupLabels(expert) {
      return [
      ["threads", "Thread / Continuity"],
      ["pages", "Pages / Work Product"],
      ["bio", "Bio / Profile"],
      ["transcripts", "Transcript / Raw Support"],
      ["minds", "Mind / Lens"],
      ["templates", "Templates"],
      ["manifests", "Manifests"],
        ["other", "Other"]
      ].filter(([key]) => (expert.files[key] || []).length > 0);
    }

    function groupDisplayName(key) {
      const labels = new Map([
        ["all", "All"],
        ["threads", "Thread / Continuity"],
        ["pages", "Pages / Work Product"],
        ["bio", "Bio / Profile"],
        ["transcripts", "Transcript / Raw Support"],
        ["minds", "Mind / Lens"],
        ["templates", "Templates"],
        ["manifests", "Manifests"],
        ["other", "Other"]
      ]);
      return labels.get(key) || key;
    }

    function renderControls() {
      els.dateList.innerHTML = state.fixture.dates
        .slice()
        .reverse()
        .map((day) => `
          <button
            type="button"
            class="date-button"
            role="option"
            aria-selected="false"
            data-date="${escapeHtml(day.date)}"
          >
            <span class="date">${escapeHtml(day.date)}</span>
            <span class="count">${day.count}</span>
          </button>
        `)
        .join("");
      state.selectedDate = state.fixture.dates[state.fixture.dates.length - 1]?.date || "";

    els.expertList.innerHTML = state.fixture.experts
      .map((expert) => {
        const total = Object.values(expert.files).flat().length;
        return `
          <button
            type="button"
            class="expert-button"
            role="option"
            aria-selected="false"
            data-expert="${escapeHtml(expert.id)}"
            title="${escapeHtml(expert.label)}"
          >
            <span>
              <span class="expert-name">${escapeHtml(expert.label)}</span>
              <span class="expert-id">${escapeHtml(expert.id)}</span>
            </span>
            <span class="count">${total}</span>
          </button>
        `;
      })
      .join("");
      state.selectedExpert = state.fixture.experts[0]?.id || "";

      renderRawCounts();
      renderExpertCounts();
    }

    function renderRawCounts() {
      const totalDates = state.fixture.dates.length;
      const totalFiles = state.fixture.dates.reduce((sum, day) => sum + day.count, 0);
      const day = selectedDate();
      els.rawCounts.innerHTML = [
        `<span class="pill">${totalDates} dates</span>`,
        `<span class="pill">${totalFiles} raw files</span>`,
        `<span class="pill">${day ? day.count : 0} on selected date</span>`
      ].join("");
    }

    function renderExpertCounts() {
    const expert = selectedExpert();
      if (!expert) {
        els.expertCounts.innerHTML = "";
        return;
      }
    const pageCount = expert.counts.pages || 0;
    const threadCount = expert.counts.threads || 0;
    const monthly = (expert.files.threads || []).filter((file) => /-thread-\d{4}-\d{2}\.md$/.test(file.name)).length;
    els.expertCounts.innerHTML = [
      `<span class="pill">${state.fixture.experts.length} experts</span>`,
      `<span class="pill">${threadCount} thread files</span>`,
      `<span class="pill">${pageCount} pages</span>`,
      `<span class="pill">${expert.counts.transcripts || 0} transcripts</span>`
    ].join("");
    els.threadNote.innerHTML = `
      <strong>${escapeHtml(expert.id)} expert surface</strong>
      <span>Thread / Continuity tracks temporal narrative and analytical continuity. Pages / Work Product are focused analytical objects. ${threadCount ? `${threadCount} thread file${threadCount === 1 ? "" : "s"}` : "No thread file found"}${monthly ? `, including ${monthly} monthly segment file${monthly === 1 ? "" : "s"}` : ""}.</span>
    `;
  }

    function currentFiles() {
      if (state.mode === "raw") {
        const day = selectedDate();
        const q = els.rawSearch.value.trim().toLowerCase();
        const files = day ? day.files : [];
        return q ? files.filter((file) => searchable(file).includes(q)) : files;
      }

      const expert = selectedExpert();
      if (!expert) return [];
      const q = els.expertSearch.value.trim().toLowerCase();
      const groups = state.selectedGroup === "all"
        ? Object.values(expert.files).flat()
        : (expert.files[state.selectedGroup] || []);
      return q ? groups.filter((file) => searchable(file).includes(q)) : groups;
    }

    function renderExpertGroups() {
      const expert = selectedExpert();
      if (!expert) {
        els.expertGroups.innerHTML = "";
        return;
      }
      const groups = groupLabels(expert);
      if (!groups.some(([key]) => key === state.selectedGroup)) {
        state.selectedGroup = groups[0]?.[0] || "all";
      }
      const total = Object.values(expert.files).flat().length;
      els.expertGroups.innerHTML = [
        `<button type="button" class="group-button ${state.selectedGroup === "all" ? "active" : ""}" data-group="all">All ${total}</button>`,
        ...groups.map(([key, label]) => {
          const count = expert.files[key].length;
          const active = state.selectedGroup === key ? "active" : "";
          return `<button type="button" class="group-button ${active}" data-group="${escapeHtml(key)}">${escapeHtml(label)} ${count}</button>`;
        })
      ].join("");
    }

    function renderList() {
      renderRawCounts();
      renderExpertCounts();
      renderExpertGroups();

      const files = currentFiles();
      state.visibleFiles = files;
    const title = state.mode === "raw"
    ? `Raw inputs for ${state.selectedDate}`
    : `${selectedExpert()?.id || "expert"}: ${groupDisplayName(state.selectedGroup)}`;
      els.listTitle.textContent = title;
      els.listCount.textContent = `${files.length} ${files.length === 1 ? "file" : "files"}`;

    if (!files.length) {
      els.fileList.innerHTML = `<div class="empty">No files match the current selection.</div>`;
      renderDateActiveState();
      renderExpertActiveState();
      return;
    }

      els.fileList.innerHTML = files.map((file, index) => {
        const active = state.selectedFile && state.selectedFile.path === file.path ? "active" : "";
        const meta = [
          file.kind,
          file.thread ? `thread:${file.thread}` : "",
          file.pubDate || file.ingestDate || "",
          fmtBytes(file.bytes)
        ].filter(Boolean);
        return `
          <button type="button" class="file-button ${active}" data-index="${index}">
            <span class="file-title">${escapeHtml(compactTitle(file))}</span>
            <span class="file-path">${escapeHtml(file.path)}</span>
            <span class="file-meta">${meta.map((m) => `<span>${escapeHtml(m)}</span>`).join("")}</span>
          </button>
        `;
    }).join("");
    renderDateActiveState();
    renderExpertActiveState();
  }

  function renderDateActiveState() {
    els.dateList.querySelectorAll(".date-button").forEach((button) => {
      const active = button.dataset.date === state.selectedDate;
      button.classList.toggle("active", active);
      button.setAttribute("aria-selected", active ? "true" : "false");
    });
  }

  function renderExpertActiveState() {
    els.expertList.querySelectorAll(".expert-button").forEach((button) => {
      const active = button.dataset.expert === state.selectedExpert;
      button.classList.toggle("active", active);
      button.setAttribute("aria-selected", active ? "true" : "false");
    });
  }

    async function loadFile(file) {
      state.selectedFile = file;
      els.selectedTitle.textContent = compactTitle(file);
      els.selectedPath.textContent = file.repoPath || file.path;
      els.readerPanel.innerHTML = `<div class="empty">Loading ${escapeHtml(file.name)}...</div>`;
      renderList();

      try {
        const response = await fetch(fileUrl(file.path), { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const text = await response.text();
        els.readerPanel.innerHTML = `${renderBinding(file)}<div class="markdown">${renderMarkdown(text)}</div>`;
      } catch (err) {
        els.readerPanel.innerHTML = `
          <div class="empty">
            Could not load <strong>${escapeHtml(file.path)}</strong><br />
            ${escapeHtml(err.message || err)}
          </div>
        `;
      }
    }

    function renderBinding(file) {
      const binding = file.threadBinding;
      if (!binding) return "";
      const rows = [
        ["Thread file", binding.threadfile],
        ["Thread month", binding.threadmonth],
        ["Thread role", binding.threadrole],
        ["Continuity delta", binding.continuitydelta]
      ].filter(([, value]) => value);
      if (!rows.length) return "";
      return `
        <div class="binding-box">
          <strong>Page-thread binding</strong>
          ${rows.map(([label, value]) => `<div><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</div>`).join("")}
        </div>
      `;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inCode = false;
      let code = [];
      let inList = false;
      let inTable = false;

      function closeList() {
        if (inList) {
          out.push("</ul>");
          inList = false;
        }
      }

      function closeTable() {
        if (inTable) {
          out.push("</tbody></table>");
          inTable = false;
        }
      }

      function inline(text) {
        return escapeHtml(text)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, label, href) => {
            const cleanHref = escapeHtml(href);
            return `<a class="source-link" href="${cleanHref}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
          });
      }

      function tableCells(line, tag) {
        return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|")
          .map((cell) => `<${tag}>${inline(cell.trim())}</${tag}>`).join("");
      }

      for (const rawLine of lines) {
        const line = rawLine.trimEnd();
        if (line.startsWith("```")) {
          closeList();
          closeTable();
          if (inCode) {
            out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            code = [];
            inCode = false;
          } else {
            inCode = true;
          }
          continue;
        }
        if (inCode) {
          code.push(rawLine);
          continue;
        }
        if (!line.trim()) {
          closeList();
          closeTable();
          continue;
        }
        if (/^\|.+\|$/.test(line)) {
          closeList();
          if (/^\|\s*-+/.test(line)) continue;
          if (!inTable) {
            out.push("<table><tbody>");
            inTable = true;
          }
          out.push(`<tr>${tableCells(line, out[out.length - 1] === "<table><tbody>" ? "th" : "td")}</tr>`);
          continue;
        }
        closeTable();
        const heading = line.match(/^(#{1,4})\s+(.*)$/);
        if (heading) {
          closeList();
          const level = Math.min(3, heading[1].length);
          out.push(`<h${level}>${inline(heading[2])}</h${level}>`);
          continue;
        }
        if (line.startsWith(">")) {
          closeList();
          out.push(`<blockquote>${inline(line.replace(/^>\s?/, ""))}</blockquote>`);
          continue;
        }
        const bullet = line.match(/^\s*[-*]\s+(.*)$/);
        if (bullet) {
          if (!inList) {
            out.push("<ul>");
            inList = true;
          }
          out.push(`<li>${inline(bullet[1])}</li>`);
          continue;
        }
        closeList();
        out.push(`<p>${inline(line)}</p>`);
      }
      closeList();
      closeTable();
      if (inCode) out.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
      return out.join("\n");
    }

    function openSelected() {
      if (!state.selectedFile) return;
      window.open(fileUrl(state.selectedFile.path), "_blank", "noopener");
    }

    async function copySelectedPath() {
      if (!state.selectedFile) return;
      const path = state.selectedFile.repoPath || state.selectedFile.path;
      try {
        await navigator.clipboard.writeText(path);
        els.copyPath.textContent = "Copied";
        setTimeout(() => { els.copyPath.textContent = "Copy path"; }, 1000);
      } catch {
        els.selectedPath.textContent = path;
      }
    }

    function wireEvents() {
      els.rawMode.addEventListener("click", () => setMode("raw"));
      els.expertMode.addEventListener("click", () => setMode("expert"));
      els.dateList.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-date]");
        if (!button) return;
        state.selectedDate = button.dataset.date;
        renderList();
        const first = currentFiles()[0];
        if (first) loadFile(first);
      });
    els.expertList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-expert]");
      if (!button) return;
      state.selectedExpert = button.dataset.expert;
    state.selectedGroup = "threads";
      renderList();
      const first = currentFiles()[0];
        if (first) loadFile(first);
      });
      els.rawSearch.addEventListener("input", renderList);
      els.expertSearch.addEventListener("input", renderList);
      els.expertGroups.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-group]");
        if (!button) return;
        state.selectedGroup = button.dataset.group;
        renderList();
      });
      els.fileList.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-index]");
        if (!button) return;
        const file = state.visibleFiles[Number(button.dataset.index)];
        if (file) loadFile(file);
      });
      els.openRaw.addEventListener("click", openSelected);
      els.copyPath.addEventListener("click", copySelectedPath);
    }

    async function init() {
      wireEvents();
      try {
        const response = await fetch("strategy-notebook-visualizer.fixture.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        state.fixture = await response.json();
        renderControls();
        setMode("raw");
        const first = currentFiles()[0];
        if (first) await loadFile(first);
        els.statusLine.textContent = `${state.fixture.dates.length} raw-input dates, ${state.fixture.experts.length} strategy experts. recordAuthority=${state.fixture.recordAuthority}; gateEffect=${state.fixture.gateEffect}; truthScope=${state.fixture.truthScope}. Workbench index only; no Record authority and no gate effect.`;
      } catch (err) {
        els.statusLine.textContent = "Could not load fixture.";
        els.readerPanel.innerHTML = `<div class="empty">${escapeHtml(err.message || err)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
