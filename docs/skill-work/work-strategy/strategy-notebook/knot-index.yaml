# knot-index.yaml — strategy-notebook knot registry (WORK only; not Record).
#
# New knot files: copy from strategy-notebook-knot-template.md (repo-relative: docs/skill-work/work-strategy/strategy-notebook/strategy-notebook-knot-template.md).
#
# Validate: `python3 scripts/validate_knot_index.py` (from repo root).
# Optional: `--warn-days-md` / `--strict-days-md` — knot basename should appear in that month's chapters/YYYY-MM/days.md.
#
# Machine list for knots organized by cluster and pattern. Paths are POSIX paths
# relative to the repository root. Each knot *file* should include the substring
# "knot" in its basename (naming protocol).
#
# Multiple weaves per calendar day → multiple knot *files* and multiple knots[] rows
# with the same `date` are normal. Disambiguate with a unique basename, e.g.:
#   strategy-notebook-knot-YYYY-MM-DD-<short-slug>.md
# Slug = knot_label (morning, islamabad, tri-mind, etc.) — avoid opaque -01 -02
# unless you prefer sequence.
#
# schema_version — bump when fields change (tooling). v3: `weave_label` renamed to `knot_label`.
#   v4: optional gamification / seam fields: `weave_count`, `seam_integrity`, `qoi_check`, `kac_check`.
#
# knots[]:
#   path         (string, required) — repo-relative path to the knot markdown file (unique)
#   date         (string, required) — YYYY-MM-DD calendar day (same date may repeat across rows)
#   knot_label   (string, optional) — stable short id for this knot on that day (tooling / sorts /
#                  joins); kebab-case slug, e.g. islamabad-morning, tri-mind; may mirror filename
#                  slug; omit if one knot that day or label is only in `note`
#   clusters     (list of string, optional) — thematic cluster slugs, e.g. islamabad-hormuz
#   patterns     (list of string, optional) — cross-cutting pattern ids, e.g. escalation-trap
#   note         (string, optional) — freeform one-line comment (not a stable key)
#   weave_count  (int, optional) — manual tally or copy from `scripts/knot_seam_metrics.py`
#                  (outgoing links to other knot files); must be >= 0
#   seam_integrity (number, optional) — subjective 0–1 seam quality for this knot (not a scoreboard)
#   qoi_check    (bool, optional) — Quality-of-information checklist done (see knot template)
#   kac_check    (bool, optional) — Key-assumptions checklist done (see knot template)
#
# Examples (commented; remove leading # to activate):
#   - path: docs/skill-work/work-strategy/strategy-notebook/chapters/2026-04/knots/strategy-notebook-knot-2026-04-13-islamabad.md
#     date: "2026-04-13"
#     knot_label: islamabad-morning
#     clusters: [islamabad-hormuz]
#     patterns: [escalation-trap-frame]
#     note: "first pass after brief"
#   - path: docs/skill-work/work-strategy/strategy-notebook/chapters/2026-04/knots/strategy-notebook-knot-2026-04-13-tri-mind.md
#     date: "2026-04-13"
#     knot_label: tri-mind
#     clusters: [trump-leo]
#     patterns: [tri-mind-batch]
#     note: "afternoon batch-analysis fold"

