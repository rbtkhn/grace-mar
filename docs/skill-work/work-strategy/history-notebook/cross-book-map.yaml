# Cross-book map: Predictive History <-> History Notebook
# SSOT for the inter-book relationship. This is the ONLY file that stores
# which PH theses/concepts are addressed by which HN chapters.
#
# Validates against:
#   - PH thesis-map.yaml (8 theses: t01–t08)
#   - PH concepts.yaml (20 concepts)
#   - HN book-architecture.yaml (all chapter ids)
#
# Coverage values: stub (no chapters mapped), partial, full
# Run: python3 scripts/validate_cross_book.py
#
# Vol I problem spine — reuse list via YAML anchor (20 chapters).
_meta_vol_i: &vol_i_all
  - hn-i-v1-01
  - hn-i-v1-02
  - hn-i-v1-03
  - hn-i-v1-04
  - hn-i-v1-05
  - hn-i-v1-06
  - hn-i-v1-07
  - hn-i-v1-08
  - hn-i-v1-09
  - hn-i-v1-10
  - hn-i-v1-11
  - hn-i-v1-12
  - hn-i-v1-13
  - hn-i-v1-14
  - hn-i-v1-15
  - hn-i-v1-16
  - hn-i-v1-17
  - hn-i-v1-18
  - hn-i-v1-19
  - hn-i-v1-20

theses:
  - thesis_id: t01
    claim: "Education and narrative formation are constitutive, not secondary."
    hn_chapters: *vol_i_all
    coverage: partial
    notes: "Vol I is problem-led; formation through education/narrative appears across the spine. Full coverage requires later volumes."

  - thesis_id: t02
    claim: "Religious imagination and empire remain structurally linked in modern power."
    hn_chapters: [hn-i-v1-01, hn-i-v1-04, hn-i-v1-12]
    coverage: partial
    notes: "Legitimacy, law/administration, and Indian geography-of-origin chapters carry Zoroastrian, Roman, and dharma angles. China mandate threads mainly in v1-16+ (deferred emphasis in notes until drafted)."

  - thesis_id: t03
    claim: "Jiang's framework generates testable historical and predictive claims."
    hn_chapters: [hn-app-method]
    coverage: stub
    notes: "Methodology thesis — handled in appendix, not civilizational chapters."

  - thesis_id: t04
    claim: "Deep prehistory extends the formation thesis: sedentism, ritual, and narrative precede and shape the institutional bundle later called civilization."
    hn_chapters: [hn-i-v1-12, hn-i-v1-16]
    coverage: partial
    notes: "India geography-of-origin and China hybridity chapters touch pre-civilizational substrates."

  - thesis_id: t05
    claim: "Secret History extends formation into power and epistemology: who narrates the past, how money and institutions train imagination, and what counts as liberation."
    hn_chapters: [hn-i-v1-08]
    coverage: partial
    notes: "Institutions vs genius / narration. Rome-forward; Persia sources in v1-19 as drafted."

  - thesis_id: t06
    claim: "Game Theory makes strategic structure explicit: players, rules, and incentives as the readable skeleton beneath formation, status, and civilizational-scale outcomes."
    hn_chapters: *vol_i_all
    coverage: partial
    notes: "Parity, fragmentation, and corridor chapters are the ancient game-theory laboratory; refine mapping as drafts land."

  - thesis_id: t07
    claim: "Great Books ties canon reading to a formation arc: consciousness, love, imagination, and liberation rhetoric as the readable spine."
    hn_chapters: [hn-app-method]
    coverage: stub
    notes: "Methodology thesis — handled in appendix. Vol I cites canonical texts as evidence inside problem chapters."

  - thesis_id: t08
    claim: "Interviews extend Predictive History into long-form dialogue: the same forecasting and formation grammar, mediated by hosts and episodic Q&A."
    hn_chapters: [hn-app-method]
    coverage: stub
    notes: "Pure methodology — appendix only."

