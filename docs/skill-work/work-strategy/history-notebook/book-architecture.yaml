      - hn-i-v1-17
      - hn-i-v1-18
      - hn-i-v1-19
      - hn-i-v1-20
    thread: "Twenty problem-led chapters; ancient material distributed across the spine (see per-civilization arcs for emphasis)."
  - arc_id: persia
    title: "The Persian Arc"
    chapters: [hn-i-v1-19, hn-ii-persia-islamic, hn-v-persia-modern]
    thread: "Tolerance → compression → siege governance. Vol I entry via parity-buffer problem chapter; each rupture densifies doctrine."
  - arc_id: rome
    title: "The Roman Arc"
    chapters: [hn-i-v1-04, hn-i-v1-05, hn-ii-rome-byzantine]
    thread: "Institutional and legal long run → expansion → persistence after territorial loss."
  - arc_id: russia
    title: "The Russian Arc"
    chapters: [hn-iii-russia, hn-iv-russia-imperial, hn-v-russia-modern]
    thread: "Marginal resilience → rupture-regeneration → temporal compression."
  - arc_id: america
    title: "The American Arc"
    chapters: [hn-iv-america, hn-v-america-hegemonic]
    thread: "Constitutional republic → industrial hegemon → overextension."
  - arc_id: anglia
    title: "The English Arc"
    chapters: [hn-iii-anglia, hn-iv-anglia-imperial]
    thread: "Maritime hegemony → managed decline."
  - arc_id: china
    title: "The Chinese Arc"
    chapters: [hn-i-v1-16, hn-i-v1-17, hn-i-v1-18, hn-ii-china-medieval, hn-v-china-modern]
    thread: "Cyclical reunification → bureaucratic maturity → patience as strategy. Vol I entry via synthesis and corridor problem chapters."

