# History Notebook — Book Architecture (SSOT)
# All chapters, sub-groupings, arcs, and operator metadata.
# Public-facing chapter prose never references this file's internal IDs (CIV-MEM, skills, etc.).
# Chapter ID convention: hn-{volume}-{slug}

project:
  id: history-notebook
  title: "History Notebook"
  purpose: "Compressed civilizational chapters distilling patterns into strategy-ready reference"
  volumes: 5
  target_chapters: 100
  chapters_per_volume: 20
  chapter_format: "See STYLE-GUIDE.md"

volumes:
  - id: vol-i
    title: "Ancient Empires (to 476 CE — Fall of Rome in the West)"
    thesis: "Twenty strategic problems; comparative ancient evidence (Persia, Rome, China, India and adjacent cases). Not civ-by-civ Parts."
    sub_groups:
      - label: "Part 1 — State formation and imperial shape"
        thesis: "Legitimacy, endurance, how power changes shape, administration, expansion ceilings."
        chapters: [hn-i-v1-01, hn-i-v1-02, hn-i-v1-03, hn-i-v1-04, hn-i-v1-05]
      - label: "Part 2 — Reach, inclusion, institutions"
        thesis: "Sea roads, inclusion and occupation, institutions vs genius, absorption, stakeholders."
        chapters: [hn-i-v1-06, hn-i-v1-07, hn-i-v1-08, hn-i-v1-09, hn-i-v1-10]
      - label: "Part 3 — Frontiers, geography, elites"
        thesis: "Overreach, geography of origin, frontier mechanism failure, elite defection, ambivalence to outside orders."
        chapters: [hn-i-v1-11, hn-i-v1-12, hn-i-v1-13, hn-i-v1-14, hn-i-v1-15]
      - label: "Part 4 — Eastern synthesis, parity, collapse"
        thesis: "Non-native rule and hybridity, fragmentation, corridors and exchange, parity and buffers, collapse and succession."
        chapters: [hn-i-v1-16, hn-i-v1-17, hn-i-v1-18, hn-i-v1-19, hn-i-v1-20]

  - id: vol-ii
    title: "Medieval (476–1453 — Fall of Constantinople)"
    thesis: "The post-Roman reconfigurations. Islam arrives; Byzantium survives; the Mongol disruption resets Eurasia; China peaks and fragments."
    sub_groups:
      - label: "Successor Civilizations"
        thesis: "What fills the vacuum when Rome falls and Persia is conquered. New formations built on old substrates."
        chapters: [hn-ii-islam, hn-ii-rome-byzantine, hn-ii-persia-islamic]
      - label: "Disruption and Reconstitution"
        thesis: "External shock as formation catalyst. The Mongol rupture resets Eurasia; China absorbs and rebuilds."
        chapters: [hn-ii-mongol, hn-ii-china-medieval]

  - id: vol-iii
    title: "Early Modern (1453–1789 — French Revolution)"
    thesis: "Post-Constantinople. Ottoman peak, European maritime expansion, Safavid revival, Muscovy emerges, colonial order begins."
    sub_groups:
      - label: "Expanding Orders"
        thesis: "Mature civilizations projecting power outward: one inherits Rome's claim, the other invents maritime empire."
        chapters: [hn-iii-ottoman, hn-iii-anglia]
      - label: "Continental Consolidators"
        thesis: "Formation through centralization and westward orientation. Both define themselves against the maritime model."
        chapters: [hn-iii-france, hn-iii-russia]

  - id: vol-iv
    title: "Industrial & Imperial (1789–1945)"
    thesis: "Revolution, industrial war, imperial collapse, world wars. The patterns that produced the current order."
    sub_groups:
      - label: "New Contenders"
        thesis: "Powers that industrialize into dominance. One succeeds through geography and institutions; the other destroys itself through speed without restraint."
        chapters: [hn-iv-america, hn-iv-germany]
      - label: "Old Empires Under Stress"
        thesis: "Established orders that the industrial era breaks and remakes. Decline as formation: what happens to the substrate when the superstructure fails."
        chapters: [hn-iv-russia-imperial, hn-iv-anglia-imperial]

  - id: vol-v
    title: "Contemporary (1945–present)"
    thesis: "The world the operator analyzes every day. Cold War, decolonization, unipolarity, and the current crisis landscape."
    sub_groups:
      - label: "Architects"
        thesis: "Powers that build or inherit the post-1945 order. One holds it; the other quietly displaces it."
        chapters: [hn-v-america-hegemonic, hn-v-china-modern]
      - label: "Endurance Powers"
        thesis: "Civilizations that survive the architects' order rather than running it. Formation under siege — persistence as the primary strategic output."
        chapters: [hn-v-russia-modern, hn-v-persia-modern]

arcs:
  - arc_id: vol-i-problem-spine
    title: "Volume I — Problem spine (reading order)"
    chapters:
      - hn-i-v1-01
      - hn-i-v1-02
      - hn-i-v1-03
      - hn-i-v1-04
      - hn-i-v1-05
