# History Notebook — Bookshelf catalog (title-level seed; HNSRC-* rows)
# Operator collection name: self-library-bookshelf (physical library + this HNSRC list; LIB-0158 in self-library).
# WORK only; not Record. Does not replace book-architecture.yaml or cross-book-map.yaml.
# Self-library pointer: LIB-0158 — users/grace-mar/self-library.md#bookshelf (owned HNSRC-* shelf; not operator_book / operator_analytical). Human overview: BOOKSHELF.md (same directory).
#
# Schema (items[]):
#   id: HNSRC-NNNN (zero-padded 4 digits, unique)
#   title, author: string (author may be "Various" or unknown)
#   year: optional int or string (publication / composition hint)
#   isbn: optional string
#   era: required — primary bucket for upload order (ancient | medieval | colonial | industrial | modern)
#   eras: optional list — when a work logically spans multiple buckets, list all that apply; must include era
#   added_batch: optional string (e.g. 2026-04-18-ancient-a) for traceability
#   tags: optional list of strings
#   hn_volume: optional — vol-i | vol-ii | vol-iii | vol-iv | vol-v | appendix
#   primary_arc: optional — matches arc_id or thread name in README (free string)
#   candidate_hn_chapters: optional list of hn-* ids (planning only; not PH coverage)
#   ph_thesis_hints / ph_concept_hints: optional lists of strings (t01… / concept ids)
#   notes: optional string
#   lib_id: optional — if promoted to users/grace-mar self-library LIB-* entry
#   content_path: optional — phase 2: gitignored file or absolute path (not committed)
#   Citation-oriented (optional; backfill lazily for formal bibliography export):
#   cite_as: optional string — sort/print name override (e.g. when author is Various)
#   place, publisher, edition, series: optional strings — imprint / edition (Chicago-style export)
#   editor, translator: optional strings — for build_hn_bookshelf_bibliography.py output
#
# Upload order: ancient → medieval → colonial → industrial → modern (see BOOKSHELF-RUNBOOK.md).
# Era "ancient" = through fall of Western Roman Empire (~476 AD); late Roman / fall-of-the-West titles stay ancient.
# Era "medieval" = post-476 AD formations through fall of Constantinople (~1453 AD); straddles into Vol III use eras/notes.
# Era "colonial" (Vol III) = post-1453 through ~1815 AD (Congress of Vienna); straddles into Vol IV use eras/notes.
# Era "industrial" (Vol IV) = post-1815 through ~1945 AD (end of WWII); straddles into Vol V use eras/notes.
# Ancient / medieval / modern (operator) 2026-04-18: shelf photos — Landmark (a); Assyria/Persians (b); Everitt/Goldsworthy/Oxford (c); late Rome–Byzantine (d); Roman lives–empire (e); Everyman Library canons (f); Penguin Clothbound epics (g). Medieval/early modern batches 2026-04-18: shelf-batch-a/b (Europe + Ottoman), batch-c (Weatherford + Khazaria), batch-d (Penguin Clothbound medieval canon). Colonial batches 2026-04-18: colonial-shelf-a (Wilson TYW + dedupe note vs HNSRC-0065/0066), b (Voltaire/French Rev), c (US founders), d (Atlantic), e (Library of America), f (Everyman Shakespeare + Enlightenment), g (Russia/Spain/Europe). Industrial/modern fiction + philosophy shelf (batch 2026-04-18-modern-shelf-photos-12): Penguin Clothbound / Everyman's / Little Black Classics / Library of America — see HNSRC-0129+. Assets: .cursor/projects/.../assets/photo_2026-04-18_11.*–12.*.png (incl. 22 files photo_2026-04-18_12.15.*–12.17.*).
# 2026-04-21 shelf photos: US history, Crowley, LOA, Bradbury, Vonnegut, Narnia, etc. — HNSRC-0241+.
# Workspace assets (same batch): .cursor/projects/Users-robertkuhne-Documents-grace-mar/assets/photo_2026-04-21_13.15.*.png

