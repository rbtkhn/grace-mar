# Bookshelf quiz anchors
#
# Handpicked source layer for self-knowledge MCQs. This is not a second catalog:
# `bookshelf-catalog.yaml` remains the title-level SSOT. These rows only mark
# which catalog items are safe, useful anchors for source-bound quiz prompts.

