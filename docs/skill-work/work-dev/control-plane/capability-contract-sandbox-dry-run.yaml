# Capability contract — Sandbox DryRunBackend
#
# Governance-wrapped mock sandbox for testing the adapter loop without real compute.
# See: sandbox-adapter-spec.md, scripts/work_dev/sandbox_adapter.py

version: 1
contract_id: "sandbox-dry-run-v1"
integration_name: "Sandbox adapter — DryRunBackend"
evaluated_at: "2026-04-06"
source_of_truth:
  - scripts/work_dev/sandbox_adapter.py
  - docs/skill-work/work-dev/sandbox-adapter-spec.md

schema:
  description: >
    Mock sandbox backend that logs the requested command and returns a
    synthetic result without executing anything. Used to prove the
    governance loop (authority check → pre-receipt → delegate → post-receipt
    → compute-ledger row) works end-to-end without real compute cost or
    side effects.
  inputs:
    - { name: command, type: string, required: true, description: "Shell command or script path (not executed)" }
    - { name: files_in, type: list, required: false, description: "Files to send into sandbox (hashed, not read)" }
    - { name: timeout_ms, type: integer, required: false, description: "Timeout (ignored by dry run)" }
    - { name: caller, type: string, required: false, description: "Who is invoking (e.g. operator, agent:work-dev)" }
    - { name: authority_class, type: enum, required: false, description: "operator | agent_supervised | agent_autonomous" }
    - { name: task_id, type: string, required: false, description: "Links to compute-ledger task_id" }
    - { name: task_type, type: string, required: false, description: "e.g. code_execution, test_run, build" }
    - { name: record_access, type: enum, required: false, description: "none | read_only | read_write" }
  outputs:
    - { name: result, type: SandboxResult, description: "Mock result with exit_code=0 and synthetic stdout" }
    - { name: pipeline_receipt_pre, type: pipeline_event, description: "sandbox_execution_pre event" }
    - { name: pipeline_receipt_post, type: pipeline_event, description: "sandbox_execution_post event" }
    - { name: compute_ledger_row, type: ledger_row, description: "Row with bucket=integration, operation=sandbox_execution, task_type" }
  idempotent: true

auth:
  mode: none
  key_source: none
  delegation_scope: "No real execution; authority check still enforced by adapter"
  notes: "The adapter checks authority_class before reaching the backend"

failure_policy:
  retry: false
  max_retries: 0
  backoff: none
  escalation: log_and_continue
  timeout_ms: 0
  known_failure_modes:
    - { mode: authority_denied, description: "Caller's authority_class does not permit the requested record_access", mitigation: "Reduce record_access or elevate authority" }

cost:
  hint: free
  typical_tokens: 0
  typical_wall_ms: 1
  ledger_bucket: integration
  notes: "No real compute. Ledger row records wall_ms=0 and outcome_confidence=1.0."

rate_limits:
  requests_per_minute: 0
  requests_per_day: 0
  notes: "No limits; local mock"

governance:
  review_requirement: none
  receipt_shape: "pipeline_event (sandbox_execution_pre + sandbox_execution_post) + compute_ledger row"
  record_authority: companion
  merge_allowed: false
  constitution_check: false
  observability: "pipeline-events.jsonl (pre + post receipts), compute-ledger.jsonl (sandbox row)"

decision:
  fit_summary: >
    Testing-only backend. Proves the governance loop works without real
    compute. Use for integration tests, CI, and adapter development.
  status: active
