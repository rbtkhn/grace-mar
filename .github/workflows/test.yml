# Run pytest and integrity/governance checks on push and PR.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone civilization_memory (pinned SHA)
        run: bash scripts/ci/clone_civilization_memory.sh

      - name: Tri-frame civ-mem routing smoke test
        run: python3 scripts/test_civmem_tri_frame_routing.py

      - name: MEM relevance suggester smoke (AMERICA)
        run: |
          python3 scripts/suggest_civ_mem_from_relevance.py AMERICA | head -40
          python3 scripts/suggest_civ_mem_from_relevance.py AMERICA >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -r bot/requirements.txt
          pip install -e .
          pip install -e ".[reflect]"

      - name: Verify grace-mar package CLI
        run: |
          python -c "from pathlib import Path; from grace_mar.repo_io import repo_root; r = repo_root(); assert (r / 'users').is_dir(), r"
          grace-mar --help
          grace-mar warmup -u grace-mar --compact | head -1
          grace-mar reflect --help | head -1

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        working-directory: ${{ github.workspace }}

      - name: Assert canonical paths
        run: python scripts/assert_canonical_paths.py --user grace-mar

      - name: Validate integrity
        run: python scripts/validate-integrity.py --user grace-mar --require-proposal-class

      - name: Validate template sync contract
        run: python scripts/validate_template_sync_contract.py

      - name: Validate strategy-notebook knot index (legacy; may be empty)
        run: python3 scripts/validate_knot_index.py

      - name: Validate strategy-page fences in expert threads
        run: python3 scripts/validate_strategy_pages.py

      - name: Validate strategy expert threads (Segment 1 prose hints)
        run: python3 scripts/validate_strategy_expert_threads.py

      - name: Validate strategy expert predictions ledger
        run: python3 scripts/validate_expert_predictions.py

      - name: Validate history-notebook operator source catalog
        run: python3 scripts/validate_hn_source_catalog.py

      - name: Strategy notebook knot weave_count drift check
        run: python3 scripts/knot_seam_metrics.py --strict-drift

      - name: Fork lifecycle unit tests
        run: pytest tests/test_fork_lifecycle.py -v --tb=short

      - name: Governance check
        run: python scripts/governance_checker.py

      - name: Validate work-dev control plane
        run: python scripts/work_dev/validate_control_plane.py

      - name: Autonomy tier evaluator smoke (GAP-007)
        run: |
          out=$(python3 scripts/work_dev/evaluate_autonomy_tiers.py)
          echo "$out"
          test "$out" = "insufficient_data"
