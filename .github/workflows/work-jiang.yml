# Validate work-jiang metadata, registries, and generated markdown (Geo-Strategy lane).
name: work-jiang

on:
  push:
    branches: [main]
    paths:
      - "research/external/work-jiang/**"
      - "scripts/work_jiang/**"
      - ".github/workflows/work-jiang.yml"
  pull_request:
    branches: [main]
    paths:
      - "research/external/work-jiang/**"
      - "scripts/work_jiang/**"
      - ".github/workflows/work-jiang.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install "pyyaml>=6.0"

      - name: Install pytest (lecture-analysis unit tests)
        run: pip install "pytest>=7.0"

      - name: Regenerate registry and renders
        run: |
          python3 scripts/work_jiang/build_source_registry.py
          python3 scripts/work_jiang/link_supporting_registries.py
          python3 scripts/work_jiang/extract_concept_mentions.py
          python3 scripts/work_jiang/render_concept_dictionary.py
          python3 scripts/work_jiang/link_claims_to_thesis.py
          python3 scripts/work_jiang/render_claims_overview.py
          python3 scripts/work_jiang/render_book_architecture.py
          python3 scripts/work_jiang/render_thesis_map.py
          python3 scripts/work_jiang/render_chapter_queue.py
          python3 scripts/work_jiang/build_all_evidence_packs.py
          python3 scripts/work_jiang/render_status_dashboard.py
          python3 scripts/work_jiang/extract_quote_candidates.py
          python3 scripts/work_jiang/render_quote_bank.py
          python3 scripts/work_jiang/link_quotes_to_chapters.py
          python3 scripts/work_jiang/render_counter_readings.py
          python3 scripts/work_jiang/link_counter_readings.py
          python3 scripts/work_jiang/render_intellectual_chronology.py

      - name: Validate metadata
        run: python3 scripts/work_jiang/validate_work_jiang.py --require-analysis-frontmatter

      - name: Validate argument layer
        run: python3 scripts/work_jiang/validate_argument_layer.py

      - name: Validate comparative layer
        run: python3 scripts/work_jiang/validate_comparative_layer.py

      - name: Validate lecture analysis JSON fixture
        run: python3 scripts/work_jiang/validate_lecture_analysis_json.py research/external/work-jiang/fixtures/lecture_analysis_valid_min.json

      - name: Pytest lecture analysis JSON
        run: pytest tests/test_lecture_analysis_json.py -q

      - name: Rebuild registry SQLite (materialized)
        run: python3 scripts/work_jiang/rebuild_registry_db.py

      - name: Check registry DB
        run: python3 scripts/work_jiang/rebuild_registry_db.py --check

      - name: Source coverage (warnings only)
        run: python3 scripts/work_jiang/check_source_coverage.py
