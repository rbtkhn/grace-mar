# Validate work-jiang metadata, registries, and generated markdown (Geo-Strategy lane).
name: work-jiang

on:
  push:
    branches: [main]
    paths:
      - "research/external/work-jiang/**"
      - "scripts/work_jiang/**"
      - ".github/workflows/work-jiang.yml"
  pull_request:
    branches: [main]
    paths:
      - "research/external/work-jiang/**"
      - "scripts/work_jiang/**"
      - ".github/workflows/work-jiang.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install "pyyaml>=6.0"

      - name: Install pytest (lecture-analysis unit tests)
        run: pip install "pytest>=7.0"

      - name: Rebuild work-jiang (registry, renders, validators)
        run: python3 scripts/work_jiang/rebuild_all.py

      - name: Validate lecture analysis JSON fixture
        run: python3 scripts/work_jiang/validate_lecture_analysis_json.py research/external/work-jiang/fixtures/lecture_analysis_valid_min.json

      - name: Pytest lecture analysis JSON
        run: pytest tests/test_lecture_analysis_json.py -q

      - name: Rebuild registry SQLite (materialized)
        run: python3 scripts/work_jiang/rebuild_registry_db.py

      - name: Check registry DB
        run: python3 scripts/work_jiang/rebuild_registry_db.py --check

      - name: Source coverage (warnings only)
        run: python3 scripts/work_jiang/check_source_coverage.py
