# PR gate: changed files must fit the lane declared on the PR (see lanes.yaml).
name: Lane scope

on:
  pull_request:
    branches: [main]

jobs:
  lane-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install "pyyaml>=6.0"

      - name: Resolve PR lane from labels
        run: python scripts/resolve_pr_lane.py

      - name: Check changed files fit declared lane
        env:
          GRACE_MAR_LOG_LANE_VIOLATIONS: "1"
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if [ "${ALLOW_CROSS_LANE}" = "true" ]; then
            python scripts/check_lane_scope.py \
              --lane "${PR_LANE}" \
              --diff "${BASE}...${HEAD}" \
              --append-observability \
              --allow-cross-lane
          else
            python scripts/check_lane_scope.py \
              --lane "${PR_LANE}" \
              --diff "${BASE}...${HEAD}" \
              --append-observability
          fi
