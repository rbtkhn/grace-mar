# Fail if deprecated COG-EM naming appears — GRACE-MAR is canonical
name: Naming check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  naming:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for deprecated COG-EM naming
        run: python scripts/check_deprecated_naming.py

      - name: Check work-cici active-prose drift
        run: python scripts/check_work_cici_drift.py
