# Run governance + integrity checks on push/PR (no secrets required).
# Catches merge-without-approval, direct-write-to-Record patterns,
# and record/integrity regressions in canonical files.
name: Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Governance check
        run: python scripts/governance_checker.py
      - name: Integrity check
        run: python scripts/validate-integrity.py --json
      - name: Template sync contract check
        run: python scripts/validate_template_sync_contract.py --json
