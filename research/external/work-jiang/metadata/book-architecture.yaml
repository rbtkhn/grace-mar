# Machine-readable book architecture for work-jiang (Geo-Strategy corpus → book/site).
# Multivolume umbrella: Predictive History — one volume per lecture series.
# Top-level project + book: Volume I (Geo-Strategy) — SSOT for render_book_architecture.py,
# validate_work_jiang drift checks, CHAPTER-QUEUE, etc.
# Nested: volume_2_civilization (civ-chNN), volume_3_secret_history (sh-chNN), volume_4_game_theory (gt-chNN), volume_5_great_books (gb-chNN), volume_6_interviews (vi-chNN), volume_7_essays (es-chNN).
# volume_4_game_theory: Game Theory book-track — see docs/skill-work/work-jiang/volume-iv-book-track-conventions.md.
# volume_5_great_books: Great Books book-track — see docs/skill-work/work-jiang/volume-v-book-track-conventions.md.
# volume_6_interviews: Interviews book-track — see docs/skill-work/work-jiang/volume-vi-book-track-conventions.md.
# volume_7_essays: Substack essays book-track — see docs/skill-work/work-jiang/volume-vii-book-track-conventions.md.
# Render: python scripts/work_jiang/render_book_architecture.py

project:
  id: work-jiang
  series_title: "Predictive History"
  volume:
    number: 1
    lecture_series: "Geo-Strategy"
  title: "Predictive History, Volume 1: Geo-Strategy"
  thesis_one_sentence: "Jiang offers a civilizational philosophy that links culture, power, education, and historical agency into one system."
  promise_paragraph: >
    Part I follows Jiang’s Geo-Strategy lectures in order: one chapter per class session
    (twenty lectures in the extended classroom arc), transcript-backed, with the same cumulative
    arc as the original teaching.
    Each Part I chapter ends with at least three clearly stated predictions drawn from the
    registry (prediction_id + short claim) for that lecture.
    Part II, after Chapter 20, uses a deep web and news search against the prediction registry
    to adjudicate each claim where evidence allows: triangulation across independent sources,
    time-stamped reporting, and explicit handling of claim types (event vs conditional vs trend
    vs interpretive). It closes with an overall evaluation of how the lecture series’s
    forecasts held up—without pretending philosophy reduces to a ledger.
  audience:
    primary: "serious general readers interested in history, philosophy, and geopolitics"
    secondary:
      - "researchers of civilizational thought"
      - "readers of Jiang's channel seeking a structured path that mirrors the classroom order"
  channel_context:
    platform: YouTube
    handle: "@PredictiveHistory"
    subscribers_at_snapshot: 2_110_000
    snapshot_date: "2026-03-24"
    avg_views_per_video: 480_000
    growth_note: "~2,100 new subs/day; 820K gained in last 30 days"
    niche_position: "Fastest-rising long-form history/geopolitics lecture channel"
  status: outline_in_progress

# Convention for prose drafts: see CHAPTER-PREDICTION-BOX.md
chapter_end_predictions:
  min_per_chapter: 3
  registry_path: prediction-tracking/registry/predictions.jsonl
  instruction: >
    End each Part I chapter with a boxed subsection "Predictions (this lecture)" listing
    the three prediction_ids below (or more if added later), each with one-sentence claim_summary.

part_2:
  title: "Part II — Analyzing Jiang's predictions"
  after_chapter: ch20
  description: >
    Deep web and news search against the Part I prediction registry: for each claim, gather
    time-stamped, citable reporting and triangulate across independent lines of evidence where
    stakes warrant. Score resolved vs pending vs not evaluable; separate antecedent and
    consequent for conditional claims; weight trend and interpretive claims by explicit
    metrics or label them honestly. Record internal tensions between chapters. Finish with an
    overall evaluation—coverage, hit rate where adjudicable, and what would update confidence
    in the framework as a whole.

